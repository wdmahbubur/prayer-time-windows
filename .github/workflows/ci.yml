name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Test and build Windows app
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@10.9.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> ${{ runner.temp }}\cargo-target

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Disable updater artifacts when signing secrets are unavailable
        if: ${{ !env.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json -Depth 100
          $config.bundle.createUpdaterArtifacts = $false
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath -Encoding utf8
          Write-Host "Updater artifacts disabled for CI because signing secrets are unavailable."

      - name: Build Windows installers
        shell: pwsh
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}\cargo-target
        run: npm run tauri:build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prayer-times-windows-installers
          if-no-files-found: error
          path: |
            ${{ runner.temp }}\cargo-target\release\bundle\msi\*.msi
            ${{ runner.temp }}\cargo-target\release\bundle\nsis\*.exe
