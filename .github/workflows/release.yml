name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, for example main or a commit SHA"
        required: true
        default: "main"
      tag:
        description: "Release tag to publish, for example v0.1.9"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      CARGO_TARGET_DIR: target
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@10.9.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = $env:TAG.TrimStart("v")
          if ($version -ne $tagVersion) {
            throw "Tag $env:TAG does not match package.json version $version"
          }
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($tauriVersion -ne $version) {
            throw "Tauri version $tauriVersion does not match package.json version $version"
          }

      - name: Create or update release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $env:TAG
          git push origin "refs/tags/$env:TAG" --force

      - name: Run tests
        run: npm test

      - name: Build Windows installers
        shell: pwsh
        run: npm run tauri:build

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required to publish signed updater assets."
          }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\msi\*.msi" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\nsis\*.exe" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\msi\*.zip" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\msi\*.sig" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\nsis\*.zip" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\nsis\*.sig" release-assets\

          $updaterZip = Get-ChildItem release-assets\*.zip | Where-Object { $_.Name -like '*.nsis.zip' } | Select-Object -First 1
          if (-not $updaterZip) {
            throw "Could not find NSIS updater zip asset."
          }

          $signature = Get-Content "$($updaterZip.FullName).sig" -Raw
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $latest = @{
            version = $env:TAG.TrimStart("v")
            notes = "Prayer Times for Windows $($env:TAG)"
            pub_date = $releaseDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/$env:TAG/$($updaterZip.Name)"
              }
            }
          } | ConvertTo-Json -Depth 6
          Set-Content -Path release-assets\latest.json -Value $latest -Encoding utf8

          Get-ChildItem release-assets | ForEach-Object {
            Write-Host "Prepared asset: $($_.Name) ($($_.Length) bytes)"
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prayer-times-windows-${{ env.TAG }}
          if-no-files-found: error
          path: release-assets/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Prayer Times ${{ env.TAG }}
          generate_release_notes: true
          files: release-assets/*
