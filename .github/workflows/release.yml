name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.8"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      CARGO_TARGET_DIR: ${{ runner.temp }}\cargo-target

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> ${{ env.CARGO_TARGET_DIR }}

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = $env:TAG.TrimStart("v")
          if ($version -ne $tagVersion) {
            throw "Tag $env:TAG does not match package.json version $version"
          }
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($tauriVersion -ne $version) {
            throw "Tauri version $tauriVersion does not match package.json version $version"
          }

      - name: Run tests
        run: npm test

      - name: Build Windows installers
        shell: pwsh
        run: npm run tauri:build

      - name: Collect release assets
        id: assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\msi\*.msi" release-assets\
          Copy-Item "$env:CARGO_TARGET_DIR\release\bundle\nsis\*.exe" release-assets\
          Get-ChildItem release-assets | ForEach-Object {
            Write-Host "Prepared asset: $($_.Name) ($($_.Length) bytes)"
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prayer-times-windows-${{ env.TAG }}
          if-no-files-found: error
          path: release-assets/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Prayer Times ${{ env.TAG }}
          generate_release_notes: true
          files: release-assets/*
